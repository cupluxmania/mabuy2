<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mabuy Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>Int'l Hospital Expo @ ICE BSD 2026</header>

<!-- NAV -->
<div class="topNav">
    <button onclick="showPage('floorPage')">Floorplan</button>
    <button onclick="showPage('dashboardPage')">Dashboard</button>
</div>

<!-- FLOOR PAGE -->
<div id="floorPage" class="page active">
    <div class="searchWrapper">
        <input id="searchBox" placeholder="🔍 Search exhibitor or booth..." autocomplete="off">
        <div id="suggestions"></div>
    </div>

    <div class="floorLegend">
        <div class="legendItem available"><span class="dot available"></span>Available</div>
        <div class="legendItem sold"><span class="dot sold"></span>Sold</div>
        <div class="legendItem booked"><span class="dot booked"></span>Booked</div>
        <div class="legendItem agent"><span class="dot agent"></span>Agent</div>
    </div>

    <div id="floorContainer">
        <div id="floor"></div>
    </div>

    <div id="zoomWidget" class="zoom-widget">
        <button id="zoomOut" type="button">−</button>
        <span id="zoomLevel">100%</span>
        <button id="zoomIn" type="button">+</button>
    </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashboardPage" class="page">

    <div class="cards">
        <div class="card">Total <b id="totalCount">0</b></div>
        <div class="card">Sold <b id="soldCount">0</b></div>
        <div class="card">Booked <b id="bookedCount">0</b></div>
        <div class="card">Available <b id="availableCount">0</b></div>
        <div class="card">Agent <b id="agentCount">0</b></div>
    </div>

    <div class="dashboard-layout">
        <div class="dashboard-tables">
            <div id="hallReport"></div>
            <div id="typeReport"></div>
        </div>

        <div class="dashboard-chart">
            <div class="chartBox">
                <canvas id="chart"></canvas>
            </div>

            <div class="chartBox">
                <canvas id="typeChart"></canvas>
            </div>
        </div>
    </div>
</div>

<!-- SIDE PANEL -->
<div id="sidePanel" class="hidden">
    <div id="panelContent"></div>
</div>

<script src="script.js"></script>
</body>
</html>
