<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mabuy Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>Int'l Hospital Expo @ ICE BSD 2026</header>

<div class="topNav">
    <button onclick="showPage('floorPage')">Floorplan</button>
    <button onclick="showPage('databasePage')">Overview</button>
</div>

<!-- FLOOR -->
<div id="floorPage" class="page active">

    <div class="searchWrapper">

        <input
            id="searchBox"
            placeholder="🔍 Search exhibitor or booth..."
            autocomplete="off"
        >

        <div id="suggestions"></div>

    </div>

    <div class="floorLegend">

        <div class="legendItem available">
            <span class="dot available"></span>
            Available
        </div>

        <div class="legendItem sold">
            <span class="dot sold"></span>
            Sold
        </div>

        <div class="legendItem booked">
            <span class="dot booked"></span>
            Booked
        </div>

        <div class="legendItem agent">
            <span class="dot agent"></span>
            Agent
        </div>

    </div>

    <div id="floorContainer">
        <div id="floor"></div>
    </div>

    <div id="zoomWidget" class="zoom-widget">

        <button id="zoomOut">−</button>

        <span id="zoomLevel">100%</span>

        <button id="zoomIn">+</button>

    </div>

</div>

<!-- DATABASE -->
<div id="databasePage" class="page">

    <div class="databaseWrapper">

        <!-- CHARTS -->
        <div class="databaseCharts">

            <div class="databaseChartCard">
                <h3>Booth Status</h3>
                <canvas id="chart"></canvas>
            </div>

            <div class="databaseChartCard">
                <h3>SQM / Stand / Booth</h3>
                <canvas id="databaseChart1"></canvas>
            </div>

            <div class="databaseChartCard">
                <h3>Local vs Overseas</h3>
                <canvas id="databaseChart2"></canvas>
            </div>

        </div>

        <!-- TABLES -->
        <div class="databaseGrid">

            <div class="databaseTableCard">

                <h3>Database Summary</h3>

                <div class="tableScroll">

                    <table id="databaseTable1">
                        <thead></thead>
                        <tbody></tbody>
                    </table>

                </div>

            </div>

            <div class="databaseTableCard">

                <h3>Booth Type Summary</h3>

                <div class="tableScroll">

                    <table id="databaseTable2">
                        <thead></thead>
                        <tbody></tbody>
                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- SIDE PANEL -->
<div id="sidePanel" class="hidden">
    <div id="panelContent"></div>
</div>

<script src="script.js"></script>

</body>
</html>
